<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Malout City Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: #f2f2f2;
    }

    .phone-frame {
      height: 90vh;
      width: calc(90vh * (390 / 844));
      margin: 5vh auto;
      overflow: hidden;
      border-radius: 40px;
      border: 10px solid #1a1a1a;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      position: relative;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    /* ---------- MENU BAR ---------- */
    #menubar {
      height: 60px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 18px;
      background: #fff;
      border-bottom: 1px solid #eee;
      z-index: 10;
      position: relative;
    }

    #menubar h2 {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      font-size: 17px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 0.3px;
    }

    .burger-btn {
      background: none;
      border: none;
      width: 26px;
      height: 20px;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      z-index: 2;
    }

    .burger-btn span {
      display: block;
      height: 2.5px;
      width: 100%;
      background: #1a1a1a;
      border-radius: 2px;
    }

    /* ---------- MAP ---------- */
    #map-wrap {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ---------- FAB OVERLAY (click outside to close) ---------- */
    #fab-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, background 0.25s ease;
      z-index: 15;
    }

    #fab-overlay.open {
      opacity: 1;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.15);
    }

    /* ---------- FAB OPTIONS ---------- */
    #fab-options {
      position: absolute;
      left: 50%;
      bottom: 92px; /* sits just above the toolbar/FAB */
      transform: translateX(-50%);
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 12px;
      z-index: 16;
    }

    .fab-option {
      width: 210px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      padding: 8px 18px;
      border-radius: 30px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
      cursor: pointer;
      opacity: 0;
      transform: translateY(14px) scale(0.9);
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      white-space: nowrap;
    }

    #fab-overlay.open ~ #fab-options .fab-option,
    #fab-options.open .fab-option {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    #fab-options.open .fab-option:nth-child(4) { transition-delay: 0.02s; }
    #fab-options.open .fab-option:nth-child(3) { transition-delay: 0.06s; }
    #fab-options.open .fab-option:nth-child(2) { transition-delay: 0.10s; }
    #fab-options.open .fab-option:nth-child(1) { transition-delay: 0.14s; }

    .fab-option span {
      font-size: 13.5px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .fab-option .icon-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #2e7d32;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    /* ---------- TOOLBAR ---------- */
    #toolbar {
      height: 78px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: #fff;
      border-top: 1px solid #eee;
      position: relative;
      z-index: 20;
    }

    #toolbar button {
      background: none;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: #6b6b6b;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    #toolbar button.fab {
      width: 56px;
      height: 56px;
      background: #2e7d32; /* single green accent */
      color: #fff;
      font-size: 26px;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateY(-14px);
      box-shadow: 0 6px 14px rgba(46, 125, 50, 0.4);
      border: 4px solid #fff;
    }

    #toolbar button.fab:hover {
      background: #256628;
    }

    #toolbar button.fab i {
      transition: transform 0.25s ease;
    }

    #toolbar button.fab.open i {
      transform: rotate(45deg); /* a rotated plus reads as a close/X icon */
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div id="menubar">
      <button class="burger-btn" aria-label="Menu">
        <i class="fa fa-bars" aria-hidden="true"></i>
      </button>
      <h2>TreeSaathi</h2>
    </div>

    <div id="map-wrap">
      <div id="map"></div>

      <div id="fab-overlay"></div>

      <div id="fab-options">
        <div class="fab-option" data-action="plant">
          <div class="icon-circle"><i class="fa fa-tree" aria-hidden="true"></i></div>
          <span>Plant a Tree</span>
        </div>
        <div class="fab-option" data-action="water">
          <div class="icon-circle"><i class="fa fa-tint" aria-hidden="true"></i></div>
          <span>Water a Tree</span>
        </div>
        <div class="fab-option" data-action="report">
          <div class="icon-circle"><i class="fa fa-exclamation-triangle" aria-hidden="true"></i></div>
          <span>Report Issue</span>
        </div>
        <div class="fab-option" data-action="adopt">
          <div class="icon-circle"><i class="fa fa-heart" aria-hidden="true"></i></div>
          <span>Adopt a Tree</span>
        </div>
      </div>
    </div>

    <div id="toolbar">
      <button><i class="fa fa-map-marker" aria-hidden="true"></i></button>
      <button><i class="fa fa-book" aria-hidden="true"></i></button>
      <button class="fab" id="fabBtn"><i class="fa fa-plus" aria-hidden="true"></i></button>
      <button><i class="fa fa-history" aria-hidden="true"></i></button>
      <button><i class="fa fa-user" aria-hidden="true"></i></button>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
    const malloutBounds = [
      [74.4550, 30.1650],
      [74.5300, 30.2150]
    ];

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: [74.4936, 30.1897],
      zoom: 13,
      minZoom: 12,
      maxZoom: 19,
      maxBounds: malloutBounds
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    // ---------- FAB MENU ----------
    const fabBtn = document.getElementById('fabBtn');
    const fabOptions = document.getElementById('fab-options');
    const fabOverlay = document.getElementById('fab-overlay');

    function setFabOpen(open) {
      fabBtn.classList.toggle('open', open);
      fabOptions.classList.toggle('open', open);
      fabOverlay.classList.toggle('open', open);
    }

    fabBtn.addEventListener('click', () => {
      const isOpen = fabBtn.classList.contains('open');
      setFabOpen(!isOpen);
    });

    fabOverlay.addEventListener('click', () => setFabOpen(false));

    document.querySelectorAll('.fab-option').forEach(opt => {
      opt.addEventListener('click', () => {
        // handle each action here
        console.log('Selected action:', opt.dataset.action);
        setFabOpen(false);
      });
    });
  </script>
</body>
</html>
